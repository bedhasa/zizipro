    <script>
      // Fix for libraries that expect Node.js globals
      (function() {
        const existingProcess = window.process || {};
        const existingEnv = existingProcess.env || {};
        
        window.process = { 
          ...existingProcess,
          env: { 
            NODE_ENV: 'development',
            ...existingEnv,
          },
          version: 'v16.0.0',
          nextTick: (cb) => setTimeout(cb, 0)
        };
      })();
      
      // Create a 'global' object that doesn't directly proxy 'set' operations to 'window'
      // This prevents "Cannot set property fetch of #<Window>" errors
      const globalTarget = {};
      window.global = new Proxy(globalTarget, {
        get(target, prop) {
          if (prop === 'global') return window.global;
          if (prop === 'process') return window.process;
          if (prop in target) return target[prop];
          return window[prop];
        },
        set(target, prop, value) {
          target[prop] = value;
          return true;
        }
      });
    </script>
  </head>

    <div id="root"></div>

  </body>
